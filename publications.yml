  pdf: ""
  data_url: ""
  summary: "This study uses the opioid epidemic as a lens to examine how health policies adopted in one state spill over into neighboring states under the American federal system. The findings reveal that state-level policy choices can export both benefits and harms across state borders, with implications for how we design intergovernmental health policy."

- title: "Listen to Me: Quality of Communication and Intergenerational Political Socialization"
