  volume: "13"
  issue: "3"
  pages: "373–397"
  doi: "https://doi.org/10.1177/1532440013497972"
  pdf: ""
  data_url: ""
  summary: "This study examines how state legislatures and courts together shape bureaucratic behavior, finding that statutory constraints embedded in enabling legislation and the threat of judicial review both discipline agency policymaking. The results illuminate how the separation of powers operates in the often-overlooked arena of state administrative law."

- title: "Congressional Oversight Hearings and Policy Control"
  authors:
    - "McGrath, Robert J."
  year: 2013
  type: article
  journal: "Legislative Studies Quarterly"
  volume: "38"
  issue: "3"
  pages: "353–380"
  doi: "https://doi.org/10.1111/lsq.12018"
  pdf: ""
  data_url: ""
  summary: "This study analyzes whether congressional oversight hearings actually change what federal agencies do, finding that agencies are more responsive to oversight when committees have jurisdiction over their budgets and when the oversight is sustained rather than episodic. The results suggest that the effectiveness of legislative oversight depends heavily on the institutional context in which it occurs."

- title: "The Rise and Fall of Radical Civil Service Reform in the U.S. States"
  authors:
    - "McGrath, Robert J."
  year: 2013
  type: article
  journal: "Public Administration Review"
  volume: "73"
  issue: "4"
  pages: "638–649"
  doi: "https://doi.org/10.1111/puar.12075"
  pdf: ""
  data_url: ""
  summary: "This study traces the adoption and subsequent abandonment of radical civil service reforms — which stripped tenure protections from public employees — across the American states, finding that these reforms often failed to deliver promised efficiency gains and generated political backlash. The findings offer cautionary lessons for reformers who view deregulating public employment as a path to better government."

- title: "Making Rules About Rulemaking: A Comparison of Presidential and Parliamentary Systems"
  authors:
    - "Jensen, Christian B."
    - "Robert J. McGrath"
  year: 2011
  type: article
  journal: "Political Research Quarterly"
  volume: "64"
  issue: "3"
  pages: "656–667"
  doi: "https://doi.org/10.1177/1065912910364218"
  pdf: ""
  data_url: ""
  summary: "This comparative study examines why some democracies adopt formal procedures governing how executive agencies make rules while others do not, finding that presidential systems are more likely to enact administrative procedure laws because of the greater separation between executive and legislative branches. The results highlight how constitutional design shapes the development of the administrative state."

- title: "Electoral Competition and the Frequency of Initiative Use in the U.S. States"
  authors:
    - "McGrath, Robert J."
  year: 2011
  type: article
  journal: "American Politics Research"
  volume: "39"
  issue: "3"
  pages: "611–638"
  doi: "https://doi.org/10.1177/1532673X10388143"
  pdf: ""
  data_url: ""
  summary: "This study examines why citizens in some states use the ballot initiative process more frequently than others, finding that electoral competition between parties is a key driver — when elections are competitive and legislative outcomes uncertain, interest groups turn more readily to direct democracy as an alternative policymaking venue. The results connect the initiative process to broader patterns of partisan competition."

