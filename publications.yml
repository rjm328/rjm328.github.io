- title: "Retrospective Congressional Oversight and the Dynamics of Legislative Influence over the Bureaucracy"
  authors:
    - "MacDonald, Jason A."
    - "Robert J. McGrath"
  year: 2016
  type: article
  journal: "Legislative Studies Quarterly"
  volume: "41"
  issue: "4"
  pages: "899–934"
  doi: "https://doi.org/10.1111/lsq.12138"
  pdf: ""
  data_url: ""
  summary: "This study examines how Congress exercises retrospective oversight — scrutinizing agencies after they have acted rather than before — and finds that legislative attention to past agency behavior shapes how agencies act in the future. The results suggest that the threat of retrospective oversight disciplines bureaucratic behavior even in the absence of formal sanctions."

- title: "The Marginality Hypothesis and Supreme Court Confirmation Votes in the Senate"
  authors:
    - "McGrath, Robert J."
    - "James A. Rydberg"
  year: 2016
  type: article
  journal: "Congress & the Presidency"
  volume: "43"
  issue: "3"
  pages: "324–351"
  doi: "https://doi.org/10.1080/07343469.2016.1196267"
  pdf: ""
  data_url: ""
  summary: "This study tests whether senators from competitive states are more likely to cross party lines when voting on Supreme Court nominees, finding limited support for the 'marginality hypothesis' that electoral vulnerability drives moderate voting on high-profile judicial confirmations. The results highlight the increasing dominance of partisan cues even in consequential Senate roll call votes."

- title: "Congress as Manager: Oversight Hearings and Agency Morale"
  authors:
    - "Marvel, John D."
    - "Robert J. McGrath"
  year: 2016
  type: article
  journal: "Journal of Public Policy"
  volume: "36"
  issue: "3"
  pages: "489–520"
  doi: "https://doi.org/10.1017/S0143814X15000367"
  pdf: ""
  data_url: ""
  summary: "This study examines how congressional oversight hearings affect the morale of federal agency employees, finding that critical oversight — particularly when politically motivated — depresses employee satisfaction and organizational commitment. The results suggest that congressional micromanagement carries hidden costs by undermining the bureaucratic capacity it purports to improve."

- title: "Constraining a Shadowy Future: Enacting APAs in Parliamentary Systems"
  authors:
    - "Rhee Baum, Jeeyang"
    - "Christian B. Jensen"
    - "Robert J. McGrath"
  year: 2016
  type: article
  journal: "Legislative Studies Quarterly"
  volume: "41"
  issue: "2"
  pages: "471–499"
  doi: "https://doi.org/10.1111/lsq.12121"
  pdf: ""
  data_url: ""
  summary: "This study examines why parliamentary governments adopt administrative procedure acts (APAs) — laws that constrain executive agencies' rulemaking authority — finding that governing parties enact these constraints strategically when they anticipate losing power. The findings reveal that formal administrative law can serve as a tool for locking in policy and limiting future governments' discretion."

- title: "Gubernatorial Veto Powers and the Size of Legislative Coalitions"
  authors:
    - "McGrath, Robert J."
    - "Jon C. Rogowski"
    - "Josh M. Ryan"
  year: 2015
  type: article
  journal: "Legislative Studies Quarterly"
  volume: "40"
  issue: "4"
  pages: "571–598"
  doi: "https://doi.org/10.1111/lsq.12089"
  pdf: ""
  data_url: ""
  summary: "This study examines how the strength of the gubernatorial veto — determined by the constitutional threshold required to override it — shapes the size of legislative coalitions that pass bills in state legislatures. Governors with strong veto powers induce larger legislative majorities because legislators anticipate the need to withstand a potential override."

- title: "Legislatures, Courts, and Statutory Control of the Bureaucracy across the U.S. States"
