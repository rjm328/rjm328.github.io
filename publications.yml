  type: article
  journal: "Political Science Research and Methods"
  volume: "6"
  issue: "1"
  pages: "153–179"
  doi: "https://doi.org/10.1017/psrm.2015.80"
  pdf: ""
  data_url: ""
  summary: "This study examines how the constitutional threshold required to override a gubernatorial veto affects executive bargaining power in state legislatures, finding that higher override thresholds give governors greater leverage to shape legislation before it reaches their desk. The results have broad implications for understanding how formal institutional rules translate into real political power."

