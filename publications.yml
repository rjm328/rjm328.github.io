- title: "Rulemaking Speed in the U.S. States"
  authors:
    - "Boushey, Graeme"
    - "Robert J. McGrath"
  year: 2023
  type: article
  journal: "Journal of Public Administration Research and Theory"
  volume: "34"
  issue: "2"
  pages: "284–300"
  doi: "https://doi.org/10.1093/jopart/muad013"
  pdf: ""
  data_url: "https://doi.org/10.7910/DVN/6PXABK"
  summary: "This study examines why state agencies complete rulemaking at different speeds, analyzing thousands of regulatory proceedings across all fifty states. The findings identify political and institutional factors — including legislative oversight capacity and gubernatorial preferences — that systematically accelerate or slow the pace at which agencies translate statutory mandates into enforceable rules."

- title: "Does Partisan Conflict Lead to Increased Bureaucratic Policymaking? Evidence from the American States"
  authors:
    - "Boushey, Graeme"
    - "Robert J. McGrath"
  year: 2020
  type: article
  journal: "Journal of Public Administration Research and Theory"
  volume: "30"
  issue: "3"
  pages: "432–447"
  doi: "https://doi.org/10.1093/jopart/muz030"
  pdf: ""
  data_url: ""
  summary: "This study tests whether partisan gridlock in state legislatures pushes policymaking into the hands of unelected bureaucrats, finding that agencies produce more rules when partisan conflict makes legislative compromise difficult. The results suggest that bureaucratic policymaking serves as a safety valve when elected politicians cannot agree."

- title: "Party Effects in State Legislative Committees"
  authors:
    - "McGrath, Robert J."
    - "Josh M. Ryan"
  year: 2019
  type: article
  journal: "Legislative Studies Quarterly"
  volume: "44"
  issue: "4"
  pages: "553–592"
  doi: "https://doi.org/10.1111/lsq.12235"
  pdf: ""
  data_url: ""
  summary: "This study examines how party majority status shapes committee behavior in state legislatures, finding that majority parties use committees as strategic tools to advance their priorities while suppressing minority-party legislation. The results demonstrate that even in lower-profile state legislative chambers, partisan politics fundamentally structure which bills survive the committee process."

- title: "A Race for the Regs: Unified Government, Statutory Deadlines, and Federal Agency Rulemaking"
  authors:
    - "MacDonald, Jason A."
    - "Robert J. McGrath"
  year: 2019
  type: article
  journal: "Legislative Studies Quarterly"
  volume: "44"
  issue: "2"
  pages: "345–381"
  doi: "https://doi.org/10.1111/lsq.12228"
  pdf: ""
  data_url: "https://doi.org/10.7910/DVN/HVMSDE"
  summary: "This study finds that federal agencies rush to complete regulations before unified government ends, exploiting statutory deadlines as an opportunity to lock in policy before a hostile incoming Congress can block or reverse their rules. The findings reveal a strategic dimension to bureaucratic timing that connects rulemaking pace to electoral cycles."

- title: "Veto Override Requirements and Executive Success"
  authors:
    - "McGrath, Robert J."
    - "Jon C. Rogowski"
    - "Josh M. Ryan"
